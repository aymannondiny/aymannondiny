<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="8" viewBox="0 0 1200 8" preserveAspectRatio="none">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0D0D0D"/>
      <stop offset="50%" stop-color="#AD1457"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <!-- Base gradient bar -->
  <rect width="1200" height="8" fill="url(#base)"/>

  <!-- Moving pink glow -->
  <rect x="-300" y="0" width="320" height="8" fill="#AD1457" opacity="0.35" filter="url(#glow)">
    <animate attributeName="x" values="-300;1300" dur="5.5s" repeatCount="indefinite"/>
  </rect>
</svg>
